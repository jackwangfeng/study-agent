<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>StudyAgent · 化学</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StudyAgent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#fafaf9" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
    <!-- main.js MUST come before alpine — registers Alpine.data on alpine:init. -->
    <script defer src="/assets/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

    <style>
      /* Tap-target: 44pt is Apple HIG. */
      .tap-target { min-height: 44px; min-width: 44px; }
      /* iOS Safari paints the system background under the safe-area inset on
         standalone PWAs — match it to our app bg so the strip doesn't read
         as "leaked dark". */
      body {
        background: #fafaf9;
        color: #1f1f1f;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Helvetica Neue", "Microsoft YaHei", sans-serif;
      }
      /* Override KaTeX default color so equations match prose (KaTeX inherits
         color but the auto-render path can sometimes drop inheritance). */
      .katex { color: inherit; }
      /* Slight gradient header texture — subtle "lab notebook" feel without
         going full skeuomorphic. */
      .header-grad {
        background: linear-gradient(180deg, #ffffff 0%, #fafaf9 100%);
      }
    </style>
  </head>
  <body class="antialiased" x-data="chemApp">
    <!-- Sticky header — clean type, soft shadow when scrolled. -->
    <header class="header-grad sticky top-0 z-10 border-b border-neutral-200/70">
      <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <!-- Inline benzene SVG so we don't depend on icon files for the
               in-app brand mark (icons/ is for PWA install only). -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12,2 21,7 21,17 12,22 3,17 3,7" />
            <line x1="6" y1="9" x2="6" y2="15" />
            <line x1="13" y1="6" x2="18" y2="6" transform="rotate(28 12 12)" stroke-opacity="0" />
          </svg>
          <div>
            <div class="text-[15px] font-semibold tracking-tight">StudyAgent</div>
            <div class="text-[11px] text-neutral-500 -mt-0.5">化学 · 高二</div>
          </div>
        </div>
        <button
          class="tap-target rounded-full px-3 text-sm text-indigo-600 hover:bg-indigo-50 active:bg-indigo-100"
          @click="reset()"
          x-show="messages.length > 0"
        >
          新一题
        </button>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pt-6 pb-32">
      <!-- Empty state: friendly card with quick prompts. -->
      <section x-show="messages.length === 0" class="mt-8">
        <div class="rounded-2xl border border-neutral-200 bg-white p-5 shadow-sm">
          <h2 class="text-base font-semibold mb-1">嗨 👋</h2>
          <p class="text-sm text-neutral-600 leading-relaxed">
            拍张化学题或者直接打字问我。我会一步一步带你想，不会直接给答案。
          </p>
          <div class="mt-4 flex flex-wrap gap-2">
            <template x-for="q in quickPrompts">
              <button
                class="text-xs rounded-full bg-neutral-100 hover:bg-neutral-200 active:bg-neutral-300 px-3 py-1.5 text-neutral-700"
                @click="text = q; send()"
                x-text="q"
              ></button>
            </template>
          </div>
        </div>
      </section>

      <!-- Conversation -->
      <section class="space-y-3 mt-2">
        <template x-for="(msg, i) in messages" :key="i">
          <article
            class="rounded-2xl p-4"
            :class="msg.role === 'user'
              ? 'bg-indigo-600 text-white ml-8 shadow-sm'
              : 'bg-white text-neutral-900 mr-8 border border-neutral-200 shadow-sm'"
          >
            <template x-if="msg.role === 'user' && msg.image">
              <img :src="msg.image" class="rounded-xl max-h-80 mb-2" />
            </template>
            <div
              class="prose prose-sm max-w-none leading-relaxed"
              :class="msg.role === 'user' ? 'prose-invert' : ''"
              x-html="msg.html"
            ></div>
          </article>
        </template>

        <div x-show="loading" class="flex items-center gap-2 text-neutral-500 text-sm pl-2">
          <div class="flex gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse" style="animation-delay:.15s"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse" style="animation-delay:.3s"></span>
          </div>
          思考中
        </div>
      </section>

      <!-- Pending image preview before send. -->
      <div x-show="pendingImage && !loading" class="mt-3 flex items-center gap-2 text-xs text-neutral-500">
        <img :src="pendingImage" class="w-12 h-12 rounded-lg object-cover" />
        <span>已选图，按发送提问</span>
        <button
          class="ml-auto text-neutral-400 hover:text-neutral-700"
          @click="pendingImage = null"
        >移除</button>
      </div>
    </main>

    <!-- Bottom action bar — light surface, indigo send. -->
    <footer class="fixed bottom-0 inset-x-0 border-t border-neutral-200 bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/80">
      <div class="max-w-2xl mx-auto px-4 py-3 flex items-end gap-2">
        <label class="tap-target rounded-full bg-neutral-100 hover:bg-neutral-200 active:bg-neutral-300 flex items-center justify-center cursor-pointer">
          <input
            type="file"
            accept="image/*"
            capture="environment"
            class="hidden"
            @change="onPick($event)"
          />
          <!-- Inline camera SVG (Heroicons-style) — feels less "emoji-toy"
               than the 📷 we had before. -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="mx-3 text-neutral-700">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
        </label>
        <textarea
          x-model="text"
          @keydown.enter.prevent.exact="send()"
          rows="1"
          placeholder="问点啥…  ↵ 发送"
          class="flex-1 resize-none rounded-2xl bg-neutral-100 px-4 py-2.5 text-[15px] text-neutral-900 placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:bg-white"
        ></textarea>
        <button
          class="tap-target rounded-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 disabled:bg-neutral-300 disabled:text-neutral-500 px-5 text-sm font-medium text-white transition-colors"
          :disabled="loading || (!text.trim() && !pendingImage)"
          @click="send()"
        >
          发送
        </button>
      </div>
    </footer>
  </body>
</html>
